<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Em Ngân Flowers</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: 'Poppins', sans-serif;
background: #fff5f8;
}

/* HEADER */
header{
text-align:center;
padding:30px 20px;
background: #fff;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

header h1{
font-family: 'Great Vibes', cursive;
font-size:50px;
color:#ff5c8a;
}

header p{
color:#888;
margin-top:5px;
}

/* LINE */
.line{
width:50px;
height:3px;
background:#ff5c8a;
margin:15px auto;
border-radius:10px;
}

/* CONTAINER */
.container{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
padding:40px 20px;
}

/* CARD */
.card{
background:white;
border-radius:20px;
width:260px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

/* IMG */
.card img{
width:100%;
height:200px;
object-fit:cover;
}

/* CONTENT */
.card-content{
padding:15px;
}

.card-content h3{
font-size:18px;
}

.price{
color:#ff5c8a;
font-weight:600;
margin-top:5px;
}

/* BUTTON */
button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#ff5c8a;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#ff3d73;
}

/* FOOTER */
footer{
text-align:center;
padding:15px;
background:#fff;
color:#888;
border-top:1px solid #eee;
}

</style>
</head>

<body>

<header>
<h1>Em Ngân Flowers</h1>
<p>Thiên Đường Của Các Loài Hoa 💐</p>
<div class="line"></div>
</header>

<div class="container">

<div class="card">
<img src="images/tulip.jpg">
<div class="card-content">
<h3>Hoa Tulip</h3>
<div class="price">300.000đ</div>
<button onclick="order('Hoa Tulip')">Đặt Hoa</button>
</div>
</div>

<div class="card">
<img src="images/lavender.jpg">
<div class="card-content">
<h3>Hoa Hồng</h3>
<div class="price">250.000đ</div>
<button onclick="order('Hoa lavender')">Đặt Hoa</button>
</div>
</div>

<div class="card">
<img src="images/camtucau.jpg">
<div class="card-content">
<h3>Hoa Cẩm Tú Cầu</h3>
<div class="price">200.000đ</div>
<button onclick="order('Hoa Cẩm Tú Cầu')">Đặt Hoa</button>
</div>
</div>

</div>

<footer>
Liên hệ: 038596113 of Fb: Mẫn Ngọc Kim Ngân
</footer>

<script>
function order(product){
let phone="8438596113";
let text="Tôi muốn đặt: "+product;
window.open("https://zalo.me/"+phone+"?text="+encodeURIComponent(text));
}
</script>

</body>
</html>
