<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Em Ngân Flowers</title>

<style>

/* ===== BODY ===== */
body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg, #fff0f5, #ffe6f0);
overflow-x: hidden;
}

/* nền hoa mờ */
body::before{
content: "";
position: fixed;
width: 100%;
height: 100%;
background: url('https://images.unsplash.com/photo-1490750967868-88aa4486c946') repeat;
background-size: 300px;
opacity: 0.05;
z-index: -1;
}

/* ===== HEADER ===== */
header{
background: rgba(255, 77, 136, 0.9);
color: white;
padding: 25px;
text-align: center;
font-size: 32px;
letter-spacing: 2px;
backdrop-filter: blur(10px);
}

/* ===== TITLE ===== */
h2{
text-align:center;
margin-top:30px;
color:#444;
font-weight:500;
letter-spacing:1px;
}

/* ===== CONTAINER ===== */
.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
padding:20px;
}

/* ===== PRODUCT CARD ===== */
.product{
background: rgba(255,255,255,0.75);
backdrop-filter: blur(10px);
margin:15px;
padding:15px;
border-radius:15px;
box-shadow: 0 10px 25px rgba(0,0,0,0.1);
width:230px;
transition: 0.3s;
position: relative;
}

.product:hover{
transform: translateY(-10px) scale(1.03);
}

/* ảnh */
.product img{
width:100%;
border-radius:12px;
height:180px;
object-fit:cover;
}

/* HOT badge */
.hot{
position:absolute;
top:10px;
left:10px;
background:#ff1a66;
color:white;
padding:3px 8px;
font-size:12px;
border-radius:5px;
}

/* ===== BUTTON ===== */
button{
background: linear-gradient(45deg, #ff4d88, #ff1a66);
color:white;
border:none;
padding:10px;
margin-top:10px;
border-radius:8px;
cursor:pointer;
width:100%;
font-weight:bold;
}

button:hover{
opacity:0.85;
}

/* ===== FOOTER ===== */
footer{
margin-top:30px;
padding:20px;
background: rgba(255,77,136,0.9);
color:white;
text-align:center;
}

</style>
</head>

<body>

<header>
🌸 EM NGÂN FLOWERS 🌸
</header>

<h2>Giỏ hoa kẽm nhung xinh xắn 💐</h2>

<div class="container">

<div class="product">
<span class="hot">HOT</span>
<img src="https://images.unsplash.com/photo-1490750967868-88aa4486c946">
<h3>Hoa Tulip</h3>
<p>300.000đ</p>
<button onclick="order('Hoa Tulip')">Đặt hàng</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1526045612212-70caf35c14df">
<h3>Hoa Hồng</h3>
<p>250.000đ</p>
<button onclick="order('Hoa Hồng')">Đặt hàng</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
<h3>Hoa Cẩm Tú Cầu</h3>
<p>180.000đ</p>
<button onclick="order('Hoa Cẩm Tú Cầu')">Đặt hàng</button>
</div>

</div>

<footer>
Liên hệ: 038596113
</footer>

<script>
function order(product){
let phone = "8438596113"; // sửa số của bạn (bỏ số 0 thêm 84)
let text = "Tôi muốn đặt: " + product;
let url = "https://zalo.me/" + phone + "?text=" + encodeURIComponent(text);
window.open(url, "_blank");
}
</script>

</body>
</html>
