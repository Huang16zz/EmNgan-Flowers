<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Em Ngân Flowers</title>

<style>

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg, #fff0f5, #ffe6f0);
position: relative;
overflow-x: hidden;
}

/* hoa nền */
body::before{
content: "";
position: fixed;
width: 100%;
height: 100%;
background: url('https://i.imgur.com/8Km9tLL.png') repeat;
opacity: 0.08;
z-index: -1;
}

/* header */
header{
background: rgba(255, 77, 136, 0.9);
color: white;
padding: 25px;
text-align: center;
font-size: 32px;
letter-spacing: 2px;
backdrop-filter: blur(10px);
}

/* tiêu đề */
h2{
text-align:center;
margin-top:30px;
color:#444;
}

/* container */
.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
}

/* card sản phẩm */
.product{
background: rgba(255,255,255,0.7);
backdrop-filter: blur(10px);
margin:15px;
padding:15px;
border-radius:15px;
box-shadow: 0 10px 25px rgba(0,0,0,0.1);
width:230px;
transition: 0.3s;
}

.product:hover{
transform: translateY(-10px) scale(1.03);
}

/* ảnh */
.product img{
width:100%;
border-radius:12px;
}

/* button */
button{
background: linear-gradient(45deg, #ff4d88, #ff1a66);
color:white;
border:none;
padding:10px;
margin-top:10px;
border-radius:8px;
cursor:pointer;
width:100%;
font-weight:bold;
}

button:hover{
opacity:0.85;
}

/* footer */
footer{
margin-top:30px;
padding:20px;
background: rgba(255,77,136,0.9);
color:white;
text-align:center;
}

</style>
</head>

<body>

<header>
🌸 EM NGÂN FLOWERS XIN CHÀO 🌸
</header>

<h2>Giỏ hoa kẽm nhung của nhà em</h2>

<div class="product">
<img src="https://i.imgur.com/Y9QZ6G6.jpg" width="200">
<h3>Hoa tulip</h3>
<p>Giá: 300.000đ</p>
<button>Đặt hàng</button>
</div>

<div class="product">
<img src="https://i.imgur.com/dK4E1Qh.jpg" width="200">
<h3>Hoa Tulip </h3>
<p>Giá: 300.000đ</p>
<button>Đặt hàng</button>
</div>

<div class="product">
<img src="https://i.imgur.com/LzK3KpG.jpg" width="200">
<h3>Hoa Cẩm Tú Cầu</h3>
<p>Giá: 180.000đ</p>
<button>Đặt hàng</button>
</div>

<p>Liên hệ đặt hoa: 038596113</p>  

</body>
</html>
