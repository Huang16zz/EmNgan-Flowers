<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Em Ngân Flowers</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>

/* ===== BODY ===== */
body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(120deg,#fff,#ffe6f0);
overflow-x:hidden;
}

/* nền blur ảnh hoa */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1490750967868-88aa4486c946");
background-size:cover;
background-position:center;
opacity:0.12;
z-index:-1;
}

/* ===== HEADER ===== */
header{
background: linear-gradient(45deg,#ff4d88,#ff1a66);
color:white;
padding:25px;
text-align:center;
font-size:34px;
letter-spacing:3px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

/* ===== TITLE ===== */
h2{
text-align:center;
margin-top:30px;
color:#333;
}

/* ===== CONTAINER ===== */
.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
padding:20px;
}

/* ===== CARD ===== */
.product{
background:white;
margin:20px;
padding:15px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
width:240px;
transition:0.4s;
position:relative;
overflow:hidden;
}

.product:hover{
transform:translateY(-10px) scale(1.05);
}

/* ảnh */
.product img{
width:100%;
height:180px;
object-fit:cover;
border-radius:15px;
transition:0.4s;
}

.product:hover img{
transform:scale(1.1);
}

/* badge */
.hot{
position:absolute;
top:10px;
left:10px;
background:#ff1a66;
color:white;
padding:5px 10px;
border-radius:8px;
font-size:12px;
}

/* ===== BUTTON ===== */
button{
background: linear-gradient(45deg,#ff4d88,#ff1a66);
color:white;
border:none;
padding:12px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
width:100%;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(255,0,100,0.4);
}

/* ===== FOOTER ===== */
footer{
margin-top:30px;
padding:20px;
background: linear-gradient(45deg,#ff4d88,#ff1a66);
color:white;
text-align:center;
}

/* ===== HOA BAY ===== */
.flower{
position:fixed;
top:-50px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(0);}
100%{transform:translateY(110vh);}
}

</style>
</head>

<body>

<header>🌸 EM NGÂN FLOWERS 🌸</header>

<h2>Giỏ hoa xinh xắn dành cho bạn 💐</h2>

<div class="container">

<div class="product">
<span class="hot">HOT</span>
<img src="https://images.unsplash.com/photo-1490750967868-88aa4486c946">
<h3>Hoa Tulip</h3>
<p>300.000đ</p>
<button onclick="order('Hoa Tulip')">Đặt hàng</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1526045612212-70caf35c14df">
<h3>Hoa Hồng</h3>
<p>250.000đ</p>
<button onclick="order('Hoa Hồng')">Đặt hàng</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
<h3>Hoa Cẩm Tú Cầu</h3>
<p>180.000đ</p>
<button onclick="order('Hoa Cẩm Tú Cầu')">Đặt hàng</button>
</div>

</div>

<footer>
Liên hệ: 038596113
</footer>

<script>

/* mở zalo */
function order(product){
let phone = "8438596113";
let text = "Tôi muốn đặt: " + product;
window.open("https://zalo.me/"+phone+"?text="+encodeURIComponent(text));
}

/* tạo hoa bay */
for(let i=0;i<20;i++){
let flower=document.createElement("div");
flower.className="flower";
flower.innerHTML="🌸";
flower.style.left=Math.random()*100+"%";
flower.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(flower);
}

</script>

</body>
</html>
